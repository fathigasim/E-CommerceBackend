services:
  api:
    build:
      context: .
      dockerfile: src/EcommerceApi/Dockerfile
    restart: always
    ports:
      - "5000:8080"
    volumes:
      - product-images:/app/wwwroot/uploads/products
    networks:
      - mynetwork
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Use the container name 'sqlserver' for the host
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EcommerceDb;User=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      - JwtSettings__Issuer=${Token_Issuer}
      - JwtSettings__Audience=${Token_Audience}
      - JwtSettings__SecretKey=${Token_SecretKey}
      - JwtSettings__ExpirationMinutes=${Token_ExpirationMinutes}
      - JwtSettings__RefreshTokenExpirationInDays=${Token_RefreshTokenExpirationInDays}
      - FrontendUrl__FrontendUrl=${FrontendUrl_FrontendUrl}
      - SmtpSettings__Host=${Smtp_Host}
      - SmtpSettings__Port=${Smtp_Port}
      - SmtpSettings__EnableSSL=${Smtp_EnableSSL}
      - SmtpSettings__From=${Smtp_From}
      - SmtpSettings__DisplayName=${Smtp_DisplayName}
      - SmtpSettings__UserName=${Smtp_Username}
      - SmtpSettings__Password=${Smtp_Password}
      - Stripe__SecretKey=${Stripe_StripeKey}
      - Stripe__WebhookSecret=${Stripe_WebhookSecret}
      - Stripe__PublishableKey=${Stripe_PublishableKey}
      - Redis__ConnectionString=ecommerce-redis:6379 # Internal network name
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: api-sqlserver
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Developer # Change to 'Standard' or 'Enterprise' if you have a license
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - mynetwork
    healthcheck:
      # Note: SQL Server 2022 uses different paths for sqlcmd sometimes
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${MSSQL_SA_PASSWORD}' -Q 'SELECT 1' -C -b"]
      interval: 20s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: ecommerce-redis
    restart: always
    # No need to expose 6379 to the world in production, keep it in 'mynetwork'
    networks:
      - mynetwork
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./Ecommerce-Frontend
      dockerfile: Dockerfile
      args:
        # Use PUBLIC URLS here, not localhost
        - VITE_API_URL=${PUBLIC_API_URL}/api
        - VITE_STATIC_IMAGES_URL=${PUBLIC_API_URL}/StaticImages
    ports:
      - "80:80" # Standard web port
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mynetwork
    depends_on:
      - api

volumes:
  sqlserver-data:
    driver: local
  product-images:
    driver: local

networks:
  mynetwork:
    driver: bridge